<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallet - Enviar Dinero</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container p-2 mt-5 border">
      <h2>Enviar Dinero</h2>

      <!-- Mostrar Saldo Actual -->
      <div class="mb-3">
        <span class="text-muted">Saldo actual: </span>
        <strong id="currentBalance"></strong>
      </div>

      <!-- Alerta -->
      <div id="alertContainer"></div>

      <!-- Busqueda de contacto -->
      <div class="mb-3">
        <label for="searchContact" class="form-label">Buscar en la agenda de transferencias:</label>
        <input type="text" class="form-control" id="searchContact" placeholder="Buscar por nombre o alias" />
      </div>
      <div class="d-flex flex-column flex-sm-row justify-content-between mb-4">
        <button type="button" id="searchBtn" class="btn btn-primary mb-2 mb-sm-0">Buscar</button>
        <button type="button" id="toggleFormBtn" class="btn btn-primary">Agregar nuevo contacto</button>
      </div>

      <!-- Formulario agregar contacto -->
      <div id="addContactForm" class="border rounded p-3 mb-4" style="display: none">
        <h5 class="mb-3">Nuevo contacto</h5>
        <div id="formAlertContainer"></div>
        <div class="mb-3">
          <label for="contactName" class="form-label">Nombre y apellido <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="contactName" placeholder="Ej: John Smith" />
        </div>
        <div class="mb-3">
          <label for="contactCBU" class="form-label">CBU <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="contactCBU" placeholder="9 dígitos numéricos" maxlength="22" />
          <div class="form-text">El CBU debe tener exactamente 9 dígitos.</div>
        </div>
        <div class="mb-3">
          <label for="contactAlias" class="form-label">Alias</label>
          <input type="text" class="form-control" id="contactAlias" placeholder="Ej: john.smith" />
        </div>
        <div class="mb-3">
          <label for="contactBank" class="form-label">Banco</label>
          <input type="text" class="form-control" id="contactBank" placeholder="Ej: Banco Nación" />
        </div>
        <div class="d-flex gap-2">
          <button type="button" id="saveContactBtn" class="btn btn-primary">Guardar contacto</button>
          <button type="button" id="cancelFormBtn" class="btn btn-secondary">Cancelar</button>
        </div>
      </div>

      <!-- Lista de contactos -->
      <h5>Contactos</h5>
      <ul id="contactList" class="list-group mb-3"></ul>

      <!-- Formulario envío -->
      <div id="sendMoneySection" style="display: none">
        <div class="mb-3">
          <label for="sendAmount" class="form-label">Monto a enviar:</label>
          <input type="number" class="form-control" id="sendAmount" placeholder="Ingresar monto" min="1" />
        </div>
        <button type="button" id="sendMoneyBtn" class="btn btn-primary my-2">Enviar dinero</button>
      </div>

      <a href="menu.html" class="btn btn-secondary mt-2">Volver al Menú Principal</a>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
      const INITIAL_BALANCE = 60000;
      const CBU_REGEX = /^\d{9}$/;
      const DEFAULT_CONTACTS = [
        { name: "John Doe", cbu: "123456789", alias: "john.doe", bank: "ABC Bank" },
        { name: "Jane Smith", cbu: "987654321", alias: "jane.smith", bank: "XYZ Bank" },
      ];

      let selectedIndex = null;

      // localStorage Contactos
      function loadContacts() {
        return JSON.parse(localStorage.getItem("contacts")) || DEFAULT_CONTACTS;
      }

      function saveContacts(contacts) {
        localStorage.setItem("contacts", JSON.stringify(contacts));
      }

      // localStorage Transacciones
      function saveTransaction(transaction) {
        const transactions = JSON.parse(localStorage.getItem("transactions")) || [];
        transactions.unshift(transaction);
        localStorage.setItem("transactions", JSON.stringify(transactions));
      }

      // Activar alertas
      function showAlert(container, message, type = "danger") {
        $(container).html($("<div>").addClass(`alert alert-${type}`).attr("role", "alert").html(message));
      }

      function clearAlert(container) {
        $(container).empty();
      }

      // Contactos
      function renderContacts(contacts) {
        selectedIndex = null;
        $("#sendMoneySection").hide();
        $("#contactList").empty();

        if (contacts.length === 0) {
          $("#contactList").append($("<li>").addClass("list-group-item text-muted").text("No se encontraron contactos."));
          return;
        }

        $.each(contacts, function (index, contact) {
          const li = $("<li>")
            .addClass("list-group-item list-group-item-action")
            .attr("data-index", index)
            .html(
              `
              <span class="fw-bold">${contact.name}</span><br>
              <span class="text-muted small">
                CBU: ${contact.cbu}, Alias: ${contact.alias || "-"}, Banco: ${contact.bank || "-"}
              </span>
            `,
            )
            // Seleccionar contacto
            .on("click", function () {
              $(".list-group-item").removeClass("active");
              $(this).addClass("active");
              selectedIndex = index;
              // Mostrar sección de envío solo al seleccionar un contacto
              $("#sendMoneySection").slideDown();
            });

          $("#contactList").append(li);
        });
      }

      $(function () {
        // Mostrar saldo actual
        const currentBalance = parseFloat(localStorage.getItem("balance")) || INITIAL_BALANCE;
        $("#currentBalance").text("$" + currentBalance.toLocaleString("es-AR"));

        // Mostrar contactos iniciales
        renderContacts(loadContacts());

        // Mostrar/ocultar formulario de nuevo contacto
        $("#toggleFormBtn").on("click", function () {
          $("#addContactForm").slideToggle();
          const isVisible = $("#addContactForm").is(":visible");
          $(this).text(isVisible ? "Cerrar formulario" : "Agregar nuevo contacto");
        });

        // Cancelar formulario
        $("#cancelFormBtn").on("click", function () {
          $("#addContactForm").slideUp();
          $("#toggleFormBtn").text("Agregar nuevo contacto");
          clearAlert("#formAlertContainer");
          $("#addContactForm input").val("");
        });

        // Guardar nuevo contacto con validaciones
        $("#saveContactBtn").on("click", function () {
          const name = $("#contactName").val().trim();
          const cbu = $("#contactCBU").val().trim();
          const alias = $("#contactAlias").val().trim();
          const bank = $("#contactBank").val().trim();

          // Validación nombre y apellido
          if (!name) {
            showAlert("#formAlertContainer", "El nombre y apellido es obligatorio.");
            return;
          }
          // Validación del CBU con RegEx
          if (!CBU_REGEX.test(cbu)) {
            showAlert("#formAlertContainer", "El CBU debe tener exactamente 9 dígitos numéricos.");
            return;
          }

          const contacts = loadContacts();
          contacts.push({ name, cbu, alias, bank });
          saveContacts(contacts);
          renderContacts(contacts);

          // Cerrar y limpiar formulario
          clearAlert("#formAlertContainer");
          $("#addContactForm input").val("");
          $("#addContactForm").slideUp();
          $("#toggleFormBtn").text("Agregar nuevo contacto");

          showAlert("#alertContainer", `Contacto <strong>${name}</strong> agregado correctamente.`, "success");
        });

        // Buscar contancto por nombre o alias
        $("#searchBtn").on("click", function () {
          const query = $("#searchContact").val().toLowerCase().trim();
          const contacts = loadContacts();
          const filtered = contacts.filter(function (c) {
            return c.name.toLowerCase().includes(query) || (c.alias && c.alias.toLowerCase().includes(query));
          });
          renderContacts(filtered);

          if (filtered.length === 0) {
            showAlert("#alertContainer", `No se encontraron contactos para <strong>${query}</strong>.`, "warning");
          } else {
            clearAlert("#alertContainer");
          }
        });

        // Enviar dinero
        $("#sendMoneyBtn").on("click", function () {
          const amount = parseFloat($("#sendAmount").val());
          const balance = parseFloat(localStorage.getItem("balance")) || INITIAL_BALANCE;
          const contact = loadContacts()[selectedIndex];

          // Validar dinero
          if (isNaN(amount) || amount <= 0) {
            showAlert("#alertContainer", "Ingrese un monto válido mayor a cero.");
            return;
          }
          if (amount > balance) {
            showAlert("#alertContainer", "Saldo insuficiente para realizar la transferencia.");
            return;
          }

          // Actualizar saldo y guardar transacción
          localStorage.setItem("balance", balance - amount);
          saveTransaction({
            type: "Transferencia",
            amount: amount,
            contact: contact.name,
            date: new Date().toISOString(),
          });

          // Alerta de confirmación
          showAlert(
            "#alertContainer",
            `Envío de <strong>$${amount.toLocaleString("es-CL")}</strong> a 
             <strong>${contact.name}</strong> realizado con éxito. Redirigiendo...`,
            "success",
          );

          $("#sendMoneyBtn").prop("disabled", true);

          setTimeout(function () {
            window.location.href = "menu.html";
          }, 2000);
        });
      });
    </script>
  </body>
</html>
