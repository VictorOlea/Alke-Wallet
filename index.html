<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallet - Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container p-2 mt-5 border">
      <h2>Inicio de Sesión</h2>
      <div id="errorAlert" class="alert alert-danger d-none" role="alert">Credenciales incorrectas. Intente nuevamente.</div>
      <div id="successAlert" class="alert alert-success d-none" role="alert">Inicio de sesión exitoso. Redirigiendo...</div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" class="form-control" id="email" placeholder="Ingrese Email" />
        </div>
        <div class="form-group">
          <label for="password">Contraseña:</label>
          <input type="password" class="form-control" id="password" placeholder="Enter password" />
        </div>
        <button type="submit" class="btn btn-primary my-2">Iniciar Sesión</button>
      </form>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
      // Credenciales Válidas
      const VALID_EMAIL = "admin@wallet.cl";
      const VALID_PASS = "12345";

      $("#loginForm").submit(function (e) {
        e.preventDefault();

        const email = $("#email").val();
        const password = $("#password").val();

        if (email === VALID_EMAIL && password === VALID_PASS) {
          $("#errorAlert").addClass("d-none");
          $("#successAlert").removeClass("d-none");

          setTimeout(function () {
            window.location.href = "menu.html";
          }, 1500);
        } else {
          $("#successAlert").addClass("d-none");
          $("#errorAlert").removeClass("d-none");
        }
      });
    </script>
  </body>
</html>
